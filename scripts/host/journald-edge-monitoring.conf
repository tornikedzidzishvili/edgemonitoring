# EMS-54: Cap journald disk usage on the Edge Monitoring host.
#
# Without a cap, journald defaults to using up to 10% of /var/log on a 38 GB
# disk that's effectively ~3.8 GB. Combined with unbounded Docker json-file
# logs, this contributed to the 2026-05-03 (EMS-53) disk-full outage.
#
# Drop-in path on the host: /etc/systemd/journald.conf.d/edge-monitoring.conf
# Apply with: systemctl restart systemd-journald
# Verify with: journalctl --disk-usage   (should be <= ~500M after vacuum)
[Journal]
SystemMaxUse=500M
# Per-file cap keeps individual journal files bounded so vacuuming is fast.
SystemMaxFileSize=50M
# Keep at least 7 days of logs even if they fit under the size cap; this gives
# us a one-week incident-investigation window before journald ages logs out.
MaxRetentionSec=7day
