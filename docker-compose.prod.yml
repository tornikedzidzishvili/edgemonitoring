services:
  api:
    image: ghcr.io/tornikedzidzishvili/edge-monitoring-api:${IMAGE_TAG:-latest}
    environment:
      - PORT=4000
      - DATABASE_URL=file:/data/edge-monitoring.db
      - SSH_KEY_MASTER_SECRET=${SSH_KEY_MASTER_SECRET}
      - CHECK_INTERVAL_SECONDS=60
      - CHECK_TIMEOUT_MS=10000
      - RP_ID=monitoring.edge.ge
      - ORIGIN=https://monitoring.edge.ge
      - PUBLIC_API_URL=${PUBLIC_API_URL:-https://monitoring.edge.ge/api}
    command: ["sh", "-lc", "cd /repo/apps/api; npx prisma migrate deploy --config prisma/prisma.config.ts || npx prisma db push --config prisma/prisma.config.ts; node /repo/apps/api/dist/index.js"]
    volumes:
      - api_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  web:
    image: ghcr.io/tornikedzidzishvili/edge-monitoring-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  proxy:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # PROXY_CONF is set by deploy scripts.
      # - HTTP config is used briefly for initial cert issuance
      # - HTTPS config is used for normal operation
      - ${PROXY_CONF:-./infra/proxy/nginx.https.conf}:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
      - web
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot

volumes:
  api_data:
  letsencrypt:
  certbot_www:
