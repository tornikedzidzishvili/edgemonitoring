## EMS-54 (post-incident hardening for EMS-53):
## Every long-running service has json-file log rotation capped at 10MB x 3 files = 30MB
## per container. Without this cap Docker's default driver lets per-container logs grow
## unbounded — which is one of the contributors that filled /var/lib/docker on prod and
## caused the 2026-05-03 outage. Keep these blocks in sync with docker-compose.yml.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  api:
    image: ghcr.io/tornikedzidzishvili/edge-monitoring-api:${IMAGE_TAG:-latest}
    environment:
      - PORT=4000
      - DATABASE_URL=file:/data/edge-monitoring.db
      - SSH_KEY_MASTER_SECRET=${SSH_KEY_MASTER_SECRET}
      - CHECK_INTERVAL_SECONDS=60
      - CHECK_TIMEOUT_MS=10000
      - RP_ID=monitoring.edge.ge
      - ORIGIN=https://monitoring.edge.ge
      - PUBLIC_API_URL=${PUBLIC_API_URL:-https://monitoring.edge.ge/api}
    # Bootstrap order on container start:
    #  1. Ensure /data/branding exists (writable by API for logo/favicon uploads — EMS-6/EMS-12).
    #     chown is best-effort: a no-op when the container runs as root (current state),
    #     and prepares the dir for a future USER node hardening step.
    #  2. Apply Prisma migrations (fall back to db push for first boot / drift).
    #  3. Start the API.
    command: ["sh", "-lc", "mkdir -p /data/branding && chown -R node:node /data/branding 2>/dev/null || true; cd /repo/apps/api; npx prisma migrate deploy --config prisma/prisma.config.ts || npx prisma db push --config prisma/prisma.config.ts; node /repo/apps/api/dist/index.js"]
    volumes:
      - api_data:/data
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  web:
    image: ghcr.io/tornikedzidzishvili/edge-monitoring-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      api:
        condition: service_healthy

  proxy:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # PROXY_CONF is set by deploy scripts.
      # - HTTP config is used briefly for initial cert issuance
      # - HTTPS config is used for normal operation
      - ${PROXY_CONF:-./infra/proxy/nginx.https.conf}:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
      - web
    restart: unless-stopped
    logging: *default-logging

  certbot:
    image: certbot/certbot
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    logging: *default-logging

volumes:
  api_data:
  letsencrypt:
  certbot_www:
