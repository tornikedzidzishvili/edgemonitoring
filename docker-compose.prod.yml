services:
  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    environment:
      - PORT=4000
      - DATABASE_URL=file:/data/edge-monitoring.db
      - SSH_KEY_MASTER_SECRET=${SSH_KEY_MASTER_SECRET}
      - CHECK_INTERVAL_SECONDS=60
      - CHECK_TIMEOUT_MS=10000
    command: ["sh", "-lc", "cd /repo/apps/api; npx prisma migrate deploy || npx prisma db push; node /repo/apps/api/dist/index.js"]
    volumes:
      - api_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      args:
        # Use same-origin API via reverse proxy
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  proxy:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Start with HTTP-only config to allow initial cert issuance.
      # After cert is issued, switch this mount to infra/proxy/nginx.https.conf and restart proxy.
      - ./infra/proxy/nginx.http.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
      - web
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot

volumes:
  api_data:
  letsencrypt:
  certbot_www:
