services:
  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - DATABASE_URL=file:/data/edge-monitoring.db
      - SSH_KEY_MASTER_SECRET=dev-ssh-master-secret-change-me
      - CHECK_INTERVAL_SECONDS=60
      - CHECK_TIMEOUT_MS=10000
    command: ["sh", "-lc", "cd /repo/apps/api; npx prisma migrate deploy || npx prisma db push; node /repo/apps/api/dist/index.js"]
    volumes:
      - api_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:4000
    ports:
      - "5173:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:4000
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

volumes:
  api_data:
    # Named volume persists data across container rebuilds
    # To backup: docker run --rm -v edge-monitoring_api_data:/data -v $(pwd):/backup alpine tar cvf /backup/db-backup.tar /data
    # To restore: docker run --rm -v edge-monitoring_api_data:/data -v $(pwd):/backup alpine tar xvf /backup/db-backup.tar -C /
