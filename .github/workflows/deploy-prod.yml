name: Deploy (prod)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/tornikedzidzishvili/edge-monitoring

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build-and-push:
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.sha_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "sha_tag=sha-${SHA_SHORT}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-api:${{ steps.meta.outputs.sha_tag }}
            ${{ env.IMAGE_PREFIX }}-api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build & push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-web:${{ steps.meta.outputs.sha_tag }}
            ${{ env.IMAGE_PREFIX }}-web:latest
          build-args: |
            VITE_API_BASE_URL=/api
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.PROD_SSH_PASSPHRASE }}
          target: ${{ secrets.PROD_APP_DIR }}
          source: "docker-compose.prod.yml,infra,scripts"

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          SSH_KEY_MASTER_SECRET: ${{ secrets.SSH_KEY_MASTER_SECRET }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.PROD_SSH_PASSPHRASE }}
          command_timeout: 10m
          script_stop: true
          envs: IMAGE_TAG,SSH_KEY_MASTER_SECRET,GHCR_TOKEN,GH_ACTOR
          script: |
            set -eu
            APP_DIR="${{ secrets.PROD_APP_DIR }}"
            if [ -z "$APP_DIR" ]; then APP_DIR=/opt/edge-monitoring; fi

            dc() { IMAGE_TAG="$IMAGE_TAG" docker compose --project-directory "$APP_DIR" -f "$APP_DIR/docker-compose.prod.yml" "$@"; }

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin

            PREV_TAG=""
            if [ -f "$APP_DIR/.image-tag" ]; then PREV_TAG=$(cat "$APP_DIR/.image-tag"); fi
            echo "$IMAGE_TAG" > "$APP_DIR/.image-tag"

            chmod +x "$APP_DIR/scripts/deploy-prod.sh" || true
            umask 077
            if [ ! -f "$APP_DIR/.env" ]; then
              printf 'SSH_KEY_MASTER_SECRET=%s\nPROXY_CONF=./infra/proxy/nginx.https.conf\nIMAGE_TAG=%s\n' "$SSH_KEY_MASTER_SECRET" "$IMAGE_TAG" > "$APP_DIR/.env"
              chmod 600 "$APP_DIR/.env"
            else
              if grep -q '^IMAGE_TAG=' "$APP_DIR/.env"; then
                sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=$IMAGE_TAG|" "$APP_DIR/.env"
              else
                echo "IMAGE_TAG=$IMAGE_TAG" >> "$APP_DIR/.env"
              fi
            fi

            docker pull ghcr.io/tornikedzidzishvili/edge-monitoring-api:"$IMAGE_TAG"
            docker pull ghcr.io/tornikedzidzishvili/edge-monitoring-web:"$IMAGE_TAG"

            dc up -d --no-build

            echo "Waiting for health check..."
            HEALTHY=false
            for i in 1 2 3 4 5; do
              sleep 10
              if dc exec -T api wget -q --spider http://127.0.0.1:4000/health 2>/dev/null; then
                echo "Health check passed on attempt $i"
                HEALTHY=true
                break
              fi
              echo "Attempt $i failed, retrying..."
            done

            if [ "$HEALTHY" = "false" ]; then
              echo "DEPLOY FAILED - health check failed after 5 attempts"
              dc logs --tail=50 api
              if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$IMAGE_TAG" ]; then
                echo "Rolling back to $PREV_TAG..."
                IMAGE_TAG="$PREV_TAG"
                dc up -d --no-build
                echo "$PREV_TAG" > "$APP_DIR/.image-tag"
                sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=$PREV_TAG|" "$APP_DIR/.env"
                sleep 15
                if dc exec -T api wget -q --spider http://127.0.0.1:4000/health 2>/dev/null; then
                  echo "Rollback successful"
                else
                  echo "WARNING: Rollback also failed!"
                fi
              fi
              exit 1
            fi

            echo "Deploy successful: $IMAGE_TAG"
            docker image prune -f || true
