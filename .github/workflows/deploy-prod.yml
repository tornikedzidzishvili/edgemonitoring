name: Deploy (prod)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.PROD_SSH_PASSPHRASE }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -eu

            APP_DIR="${{ secrets.PROD_APP_DIR }}"
            if [ -z "$APP_DIR" ]; then APP_DIR=/opt/edge-monitoring; fi
            
            REPO_URL="https://${{ secrets.GH_PAT }}@github.com/tornikedzidzishvili/edgemonitoring.git"
            
            mkdir -p "$APP_DIR"
            
            if [ ! -d "$APP_DIR/.git" ]; then
              echo "[1/3] Cloning repo"
              git clone "$REPO_URL" "$APP_DIR"
            else
              echo "[1/3] Updating repo"
              cd "$APP_DIR"
              git remote set-url origin "$REPO_URL"
              git fetch --all --prune
              git reset --hard origin/main
            fi

            # Ensure scripts are executable
            chmod +x "$APP_DIR/scripts/"*.sh || true

            # Deploy
            export SKIP_GIT=1
            export FORCE_REBUILD=1
            export SSH_KEY_MASTER_SECRET='${{ secrets.SSH_KEY_MASTER_SECRET }}'
            export CERTBOT_EMAIL='${{ secrets.CERTBOT_EMAIL }}'
            export APP_DIR

            "$APP_DIR/scripts/deploy-prod.sh"
