name: Deploy (prod)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Repo is private; instead of cloning on the server, upload the code over SSH.
      - name: Upload to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.PROD_SSH_PASSPHRASE }}
          target: ${{ secrets.PROD_APP_DIR }}
          source: "docker-compose.prod.yml,apps,infra,scripts,package.json,package-lock.json,tsconfig.base.json,README.md,.gitattributes"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.PROD_SSH_PASSPHRASE }}
          script_stop: true
          script: |
            set -eu

            APP_DIR="${{ secrets.PROD_APP_DIR }}"
            if [ -z "$APP_DIR" ]; then APP_DIR=/opt/edge-monitoring; fi

            # Ensure scripts are executable
            chmod +x "$APP_DIR/scripts/deploy-prod.sh" || true

            # Deploy (skip git since code was uploaded)
            export SKIP_GIT=1
            export SSH_KEY_MASTER_SECRET='${{ secrets.SSH_KEY_MASTER_SECRET }}'
            export CERTBOT_EMAIL='${{ secrets.CERTBOT_EMAIL }}'
            export APP_DIR

            "$APP_DIR/scripts/deploy-prod.sh"
